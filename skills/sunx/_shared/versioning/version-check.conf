# Placement: sunx/_shared/versioning/version-check.conf
# This file is sourced by POSIX sh. Keep values quoted.

ENABLE_VERSION_CHECK="true"
MANUAL_UPGRADE_ONLY="false"
LAST_CHECKED_DATE=""

# Local skill file that should be compared.
# If the checker is called with a second argument, that value wins.
LOCAL_SKILL_FILE="./SKILL.md"

# GitHub repository settings.
GITHUB_REPO_URL="https://github.com/SunX-DEX/sunx-skills-hub"
REMOTE_BRANCH="main"

# Metadata is read from the remote README.md frontmatter.
# Adjust these paths if your repo structure changes.
REMOTE_METADATA_PATH="sunx-dex/README.md"

# Optional helper fields for AI guidance after the user chooses "Upgrade now".
REMOTE_SKILL_PATH="sunx-dex/SKILL.md"
REMOTE_README_PATH="sunx-dex/README.md"
